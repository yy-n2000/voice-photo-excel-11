<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta name="mobile-web-app-capable" content="yes">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f0f2f5; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #4472C4, #2d5aa0); color: white; padding: 20px 16px 16px; text-align: center; }
    .header h1 { font-size: 20px; margin-bottom: 4px; }
    .header p  { font-size: 13px; opacity: 0.85; }
    /* PWA install banner */
    .pwa-banner { background: #fff3cd; border-bottom: 1px solid #ffc107; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: #856404; }
    .pwa-banner button { background: #ffc107; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; color: #333; font-weight: 600; }
    .pwa-banner .close-btn { background: none; color: #aaa; padding: 4px; }
    
    .container { padding: 16px; max-width: 600px; margin: 0 auto; }

    .input-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .input-card h2 { font-size: 15px; color: #333; margin-bottom: 16px; }

    .voice-btn { width: 100%; height: 64px; border-radius: 32px; border: none; background: linear-gradient(135deg, #4472C4, #2d5aa0); color: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.2s; -webkit-tap-highlight-color: transparent; margin-bottom: 8px; }
    .voice-btn.recording  { background: linear-gradient(135deg, #e74c3c, #c0392b); }
    .voice-btn.processing { background: linear-gradient(135deg, #f39c12, #e67e22); pointer-events: none; }
    .wave-bars { display: flex; align-items: center; gap: 3px; height: 24px; }
    .wave-bar  { width: 4px; background: white; border-radius: 2px; animation: wave 0.8s ease-in-out infinite; }
    .wave-bar:nth-child(1){animation-delay:0.0s}.wave-bar:nth-child(2){animation-delay:0.1s}.wave-bar:nth-child(3){animation-delay:0.2s}.wave-bar:nth-child(4){animation-delay:0.3s}.wave-bar:nth-child(5){animation-delay:0.2s}.wave-bar:nth-child(6){animation-delay:0.1s}
    @keyframes wave { 0%,100%{height:4px} 50%{height:22px} }
    .voice-status { text-align:center; font-size:13px; color:#aaa; margin-bottom:14px; min-height:18px; }
    .voice-status.recording  { color:#e74c3c; font-weight:500; }
    .voice-status.processing { color:#f39c12; font-weight:500; }

    .text-display { width:100%; min-height:90px; border:1.5px solid #e0e0e0; border-radius:12px; padding:12px; font-size:15px; color:#333; background:#fafafa; resize:vertical; outline:none; margin-bottom:16px; line-height:1.6; font-family:inherit; }

    .photo-label { font-size:14px; color:#666; margin-bottom:10px; }

    .photo-item  { width:90px; height:90px; border-radius:12px; overflow:hidden; position:relative; }

    .photo-item .btn-row { position:absolute; bottom:0; left:0; right:0; display:flex; }
    .photo-item .edit-btn   { flex:1; background:rgba(68,114,196,0.85); color:white; border:none; font-size:11px; padding:4px 0; cursor:pointer; }
    .photo-item .remove-btn { flex:1; background:rgba(0,0,0,0.55); color:white; border:none; font-size:11px; padding:4px 0; cursor:pointer; }
    .add-photo-btn { width:90px; height:90px; border-radius:12px; border:2px dashed #c0c0c0; background:#f8f8f8; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; color:#999; font-size:12px; gap:4px; -webkit-tap-highlight-color:transparent; }
    .add-photo-btn span:first-child { font-size:28px; }

    .add-row-btn { width:100%; height:52px; border-radius:12px; border:none; background:#27ae60; color:white; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; -webkit-tap-highlight-color:transparent; }
    .add-row-btn:active { background:#219a52; }

    .editor-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:1000; display:none; flex-direction:column; }
    .editor-overlay.show { display:flex; }
    .editor-toolbar { padding:10px 12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:#1a1a2e; }
    .tool-btn { background:#2d2d44; color:white; border:2px solid transparent; border-radius:8px; padding:6px 10px; font-size:13px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .tool-btn.active { border-color:#4472C4; background:#4472C4; }
    .color-dot { width:28px; height:28px; border-radius:50%; border:3px solid transparent; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .color-dot.active { border-color:white; }
    .size-slider { width:80px; accent-color:#4472C4; }
    .editor-canvas-wrap { flex:1; overflow:auto; display:flex; align-items:center; justify-content:center; padding:10px; }
    .editor-canvas-wrap canvas { border-radius:8px; touch-action:none; max-width:100%; }
    .editor-actions { padding:12px; display:flex; gap:10px; background:#1a1a2e; }
    .editor-actions button { flex:1; height:46px; border-radius:12px; border:none; color:white; font-size:15px; cursor:pointer; }
    .btn-cancel { background:#555; } .btn-undo { background:#666; }
    .btn-clear  { background:#e74c3c; } .btn-save { background:#27ae60; }

    .records-card { background:white; border-radius:16px; padding:20px; margin-bottom:16px; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
    .records-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .records-header h2 { font-size:15px; color:#333; }
    .record-count { background:#4472C4; color:white; border-radius:12px; padding:2px 10px; font-size:13px; }
    .record-item { border:1px solid #eee; border-radius:12px; padding:12px; margin-bottom:10px; background:#fafafa; }
    .record-item-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .row-num { font-size:12px; color:#999; }
    .delete-row-btn { border:none; background:none; color:#e74c3c; font-size:13px; cursor:pointer; padding:2px 6px; }
    .record-text { font-size:14px; color:#333; margin-bottom:8px; line-height:1.5; }
    .record-images { display:flex; gap:8px; flex-wrap:wrap; }
    .record-images img { width:56px; height:56px; object-fit:cover; border-radius:8px; }
    .empty-tip { text-align:center; color:#bbb; font-size:14px; padding:20px 0; }

    .export-btn { width:100%; height:56px; border-radius:16px; border:none; background:linear-gradient(135deg,#f39c12,#e67e22); color:white; font-size:17px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:30px; box-shadow:0 4px 15px rgba(243,156,18,0.35); -webkit-tap-highlight-color:transparent; }
    .export-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .export-btn:not(:disabled):active { transform:scale(0.98); }

    #fileInput { display:none; }
    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.75); color:white; padding:10px 22px; border-radius:24px; font-size:14px; display:none; z-index:9999; white-space:nowrap; }
    .toast.show { display:block; }
  </style>
</head>
<body>

<div class="pwa-banner" id="pwaBanner" style="display:none">
  <span>📲 安装到主屏幕，离线也能用</span>
  <div style="display:flex;gap:6px">
    <button onclick="installPWA()">立即安装</button>
    <button class="close-btn" onclick="dismissBanner()">✕</button>
  </div>
</div>

<div class="header">
  <h1>🎤 语音拍照记录表</h1>
  <p>离线语音输入 + 拍照标注，自动生成Excel</p>
</div>

<div class="container">
  <div class="input-card">
    <h2>➕ 新增一行记录</h2>
    <button class="voice-btn" id="voiceBtn" onclick="toggleRecording()">
      <span id="voiceBtnInner">🎤 点击开始录音</span>
    </button>
    <div class="voice-status" id="voiceStatus">点击按钮开始说话，说完再次点击停止识别</div>
    <textarea class="text-display" id="textDisplay" placeholder="语音识别结果显示在这里，也可以手动输入或修改..."></textarea>
    
    <div class="photo-label">📷 添加图片（最多3张，可点击✏️标注）</div>
    <div class="photo-grid" id="photoGrid">
      <div class="add-photo-btn" onclick="addPhoto()"><span>＋</span><span>拍照/选图</span></div>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFileSelect(event)">
    <button class="add-row-btn" onclick="addRow()">✅ 添加到记录列表</button>
  </div>

  <div class="records-card">
    <div class="records-header">
      <h2>📋 已记录</h2>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="record-count" id="recordCount">0 行</span>
        <button onclick="clearAllRecords()" style="border:none;background:none;color:#e74c3c;font-size:13px;cursor:pointer;padding:2px 4px">清空</button>
      </div>
    </div>
    <div id="recordsList"></div>
    <button class="export-btn" id="exportBtn" onclick="exportExcel()" disabled>📊 导出 Excel 文件</button>
  </div>
</div>

<div class="editor-overlay" id="editorOverlay">
  <div class="editor-toolbar">
    <button class="tool-btn active" id="toolPen"    onclick="setTool('pen')">✏️ 画笔</button>
    <button class="tool-btn"        id="toolCircle" onclick="setTool('circle')">⭕ 圆圈</button>
    <button class="tool-btn"        id="toolArrow"  onclick="setTool('arrow')">➡️ 箭头</button>
    <button class="tool-btn"        id="toolText"   onclick="setTool('text')">📝 文字</button>
    <div style="width:1px;height:28px;background:#444;margin:0 2px"></div>
    <div class="color-dot active" style="background:#ff3b30" onclick="setColor('#ff3b30')" data-color="#ff3b30"></div>
    <div class="color-dot"        style="background:#ffcc00" onclick="setColor('#ffcc00')" data-color="#ffcc00"></div>
    <div class="color-dot"        style="background:#34c759" onclick="setColor('#34c759')" data-color="#34c759"></div>
    <div class="color-dot"        style="background:#007aff" onclick="setColor('#007aff')" data-color="#007aff"></div>
    <div class="color-dot"        style="background:#ffffff" onclick="setColor('#ffffff')" data-color="#ffffff"></div>
    <div style="width:1px;height:28px;background:#444;margin:0 2px"></div>
    <input class="size-slider" type="range" min="2" max="20" value="4" oninput="setSize(this.value)">
  </div>
  <div class="editor-canvas-wrap"><canvas id="editorCanvas"></canvas></div>
  <div class="editor-actions">
    <button class="btn-cancel" onclick="closeEditor()">取消</button>
    <button class="btn-undo"   onclick="undoStroke()">↩ 撤销</button>
    <button class="btn-clear"  onclick="clearAnnotations()">🗑 清除</button>
    <button class="btn-save"   onclick="saveAnnotation()">✅ 保存</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== 全局状态 =====================
let records=[], currentImages=[], isRecording=false, safetyTimer=null;

// ===================== Vosk 离线语音识别 =====================
let voskModel = null;
let recognizer = null;
let audioCtx = null;
let mediaStreamSource = null;
let processor = null;

async function initVosk() {
  if (voskModel && recognizer) return true;
  
  showToast('首次加载离线模型(约40MB)，请耐心等待...');
  try {
    const { createModel } = window.Vosk;
    // 指向你 GitHub 仓库中的模型压缩包路径
    voskModel = await createModel('vosk-model-small-cn-0.2.2.zip'); 
    recognizer = new voskModel.KaldiRecognizer(16000);
    showToast('离线模型加载完成 ✅');
    return true;
  } catch (err) {
    showToast('模型加载失败，请检查网络或模型路径');
    console.error(err);
    setBtnIdle();
    return false;
  }
}

async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    setBtnProcessing(); // 显示加载状态
    const isReady = await initVosk();
    if (isReady) await startRecording();
  }
}

function setBtnRecording(){
  isRecording=true;
  document.getElementById('voiceBtn').className='voice-btn recording';
  document.getElementById('voiceBtnInner').innerHTML='<div class="wave-bars"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div> 点击停止录音';
  const s=document.getElementById('voiceStatus'); s.textContent='🔴 正在录音...'; s.className='voice-status recording';
}

function setBtnProcessing(){
  isRecording=false;
  document.getElementById('voiceBtn').className='voice-btn processing';
  document.getElementById('voiceBtnInner').textContent='⏳ 识别加载中...';
  const s=document.getElementById('voiceStatus'); s.textContent='正在加载离线模型，请稍候...'; s.className='voice-status processing';
}

function setBtnIdle(){
  isRecording=false;
  document.getElementById('voiceBtn').className='voice-btn';
  document.getElementById('voiceBtnInner').textContent='🎤 点击开始录音';
  const s=document.getElementById('voiceStatus'); s.textContent='点击按钮开始说话，说完再次点击停止识别'; s.className='voice-status';
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, channelCount: 1, sampleRate: 16000 }
    });
    
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    mediaStreamSource = audioCtx.createMediaStreamSource(stream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    
    document.getElementById('textDisplay').value = '';
    
    processor.onaudioprocess = (e) => {
      if (!isRecording) return;
      const audioData = e.inputBuffer.getChannelData(0);
      
      if (recognizer.acceptWaveform(audioData)) {
        const result = recognizer.getResult();
        if (result.text) {
          // 去除 Vosk 中文识别结果里自带的空格
          const cleanText = result.text.replace(/\s+/g, '');
          const currentText = document.getElementById('textDisplay').value;
          document.getElementById('textDisplay').value = currentText + cleanText;
        }
      }
    };

    mediaStreamSource.connect(processor);
    processor.connect(audioCtx.destination);

    setBtnRecording();
    
    // 安全机制：最长录音1分钟自动停止
    safetyTimer = setTimeout(() => {
      if (isRecording) stopRecording();
    }, 60000);

  } catch (err) {
    showToast('无法启动录音：' + err.message);
    setBtnIdle();
  }
}

function stopRecording() {
  isRecording = false;
  clearTimeout(safetyTimer);
  
  if (processor) {
    processor.disconnect();
    processor = null;
  }
  if (mediaStreamSource) {
    mediaStreamSource.mediaStream.getTracks().forEach(t => t.stop());
    mediaStreamSource.disconnect();
    mediaStreamSource = null;
  }
  if (audioCtx && audioCtx.state !== 'closed') {
    audioCtx.close();
    audioCtx = null;
  }

  // 获取最后一段未完成的识别结果
  if (recognizer) {
    const finalResult = recognizer.getFinalResult();
    if (finalResult.text) {
      const cleanText = finalResult.text.replace(/\s+/g, '');
      const currentText = document.getElementById('textDisplay').value;
      document.getElementById('textDisplay').value = currentText + cleanText;
    }
  }

  setBtnIdle();
}

// ===================== PWA =====================
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('pwaBannerDismissed')) {
    document.getElementById('pwaBanner').style.display = 'flex';
  }
});
function installPWA() {
  if (!deferredPrompt) {
    showToast('请在浏览器菜单中选择"添加到主屏幕"');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('pwaBanner').style.display = 'none';
  });
}
function dismissBanner() {
  localStorage.setItem('pwaBannerDismissed', '1');
  document.getElementById('pwaBanner').style.display = 'none';
}
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ===================== IndexedDB =====================
const DB_NAME='voiceExcelDB', DB_VERSION=1, STORE_NAME='records';
let db=null;
function openDB() {
  return new Promise((resolve,reject) => {
    if(db){resolve(db);return;}
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(STORE_NAME,{keyPath:'id'});
    req.onsuccess=e=>{db=e.target.result;resolve(db);};
    req.onerror=e=>reject(e.target.error);
  });
}
async function saveToStorage() {
  try {
    const idb=await openDB();
    const tx=idb.transaction(STORE_NAME,'readwrite');
    const store=tx.objectStore(STORE_NAME);
    store.clear();
    records.forEach((row,i)=>store.put({id:i,...row}));
    tx.onerror=e=>console.error('保存失败',e.target.error);
  } catch(e){console.error(e);}
}
async function loadFromStorage() {
  try {
    const idb=await openDB();
    const req=idb.transaction(STORE_NAME,'readonly').objectStore(STORE_NAME).getAll();
    req.onsuccess=()=>{
      const rows=req.result;
      if(rows&&rows.length){
        records=rows.sort((a,b)=>a.id-b.id).map(({id,...rest})=>rest);
        renderRecordsList();
        showToast(`已恢复 ${records.length} 行记录`);
      }
    };
  } catch(e){console.error(e);}
}
window.addEventListener('load', loadFromStorage);

// ===================== 图片压缩 =====================
function compressImage(dataUrl, maxSize=2000, quality=0.95) {
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxSize/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const c=document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

// ===================== 图片选择 =====================
function addPhoto(){
  if(currentImages.length>=3){showToast('最多添加3张图片');return;}
  document.getElementById('fileInput').click();
}
async function handleFileSelect(e){
  for(const file of e.target.files){
    if(currentImages.length>=3) break;
    if(!file.type.startsWith('image/')) continue;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const compressed=await compressImage(ev.target.result,2000,0.95);
      currentImages.push(compressed);
      renderPhotoGrid();
    };
    reader.readAsDataURL(file);
  }
  e.target.value='';
}
function removePhoto(i){currentImages.splice(i,1);renderPhotoGrid();}
function renderPhotoGrid(){
  const grid=document.getElementById('photoGrid');
  grid.innerHTML='';
  currentImages.forEach((src,i)=>{
    const d=document.createElement('div'); d.className='photo-item';
    d.innerHTML=`<img src="${src}"><div class="btn-row"><button class="edit-btn" onclick="openEditor(${i})">✏️</button><button class="remove-btn" onclick="removePhoto(${i})">✕</button></div>`;
    grid.appendChild(d);
  });
  if(currentImages.length<3){
    const add=document.createElement('div'); add.className='add-photo-btn'; add.onclick=addPhoto;
    add.innerHTML='<span>＋</span><span>拍照/选图</span>'; grid.appendChild(add);
  }
}

// ===================== 标注编辑器 =====================
let editingIndex=-1, tool='pen', drawColor='#ff3b30', drawSize=4;
let strokes=[], currentStroke=null, isDrawing=false, baseImage=null, canvas, ctx, startX, startY;

function openEditor(index){
  editingIndex=index; strokes=[]; currentStroke=null; isDrawing=false;
  baseImage=new Image();
  baseImage.onload=()=>{
    const scale=Math.min((window.innerWidth-20)/baseImage.width,(window.innerHeight-180)/baseImage.height,1);
    canvas.width=baseImage.width*scale; canvas.height=baseImage.height*scale;
    redrawCanvas(); document.getElementById('editorOverlay').classList.add('show');
  };
  baseImage.src=currentImages[index];
}
function redrawCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(baseImage,0,0,canvas.width,canvas.height);strokes.forEach(s=>drawStroke(s));}
function drawStroke(stroke){
  ctx.save(); ctx.strokeStyle=stroke.color;
  ctx.fillStyle=stroke.color;
  ctx.lineWidth=stroke.size; ctx.lineCap='round'; ctx.lineJoin='round';
  if(stroke.type==='pen'){ctx.beginPath();stroke.points.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();}
  else if(stroke.type==='circle'){const dx=stroke.x2-stroke.x1,dy=stroke.y2-stroke.y1;ctx.beginPath();ctx.ellipse(stroke.x1+dx/2,stroke.y1+dy/2,Math.abs(dx)/2,Math.abs(dy)/2,0,0,Math.PI*2);ctx.stroke();}
  else if(stroke.type==='arrow'){const angle=Math.atan2(stroke.y2-stroke.y1,stroke.x2-stroke.x1),hLen=Math.max(15,stroke.size*4);ctx.beginPath();ctx.moveTo(stroke.x1,stroke.y1);ctx.lineTo(stroke.x2,stroke.y2);ctx.stroke();ctx.beginPath();ctx.moveTo(stroke.x2,stroke.y2);ctx.lineTo(stroke.x2-hLen*Math.cos(angle-Math.PI/7),stroke.y2-hLen*Math.sin(angle-Math.PI/7));ctx.lineTo(stroke.x2-hLen*Math.cos(angle+Math.PI/7),stroke.y2-hLen*Math.sin(angle+Math.PI/7));ctx.closePath();ctx.fill();}
  else if(stroke.type==='text'){ctx.font=`bold ${stroke.size*5+10}px PingFang SC,sans-serif`;ctx.fillText(stroke.text,stroke.x1,stroke.y1);}
  ctx.restore();
}
function getPos(e){const rect=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;return{x:(src.clientX-rect.left)*canvas.width/rect.width,y:(src.clientY-rect.top)*canvas.height/rect.height};}
function onStart(e){e.preventDefault();const pos=getPos(e);startX=pos.x;startY=pos.y;if(tool==='text'){const t=prompt('请输入文字：');if(t){strokes.push({type:'text',color:drawColor,size:drawSize,x1:pos.x,y1:pos.y,text:t});redrawCanvas();}return;}isDrawing=true;currentStroke={type:tool,color:drawColor,size:drawSize,x1:pos.x,y1:pos.y,x2:pos.x,y2:pos.y,points:[{x:pos.x,y:pos.y}]};}
function onMove(e){e.preventDefault();if(!isDrawing||!currentStroke)return;const pos=getPos(e);if(tool==='pen')currentStroke.points.push({x:pos.x,y:pos.y});else{currentStroke.x2=pos.x;currentStroke.y2=pos.y;}redrawCanvas();drawStroke(currentStroke);}
function onEnd(e){e.preventDefault();if(!isDrawing||!currentStroke)return;isDrawing=false;strokes.push({...currentStroke});currentStroke=null;redrawCanvas();}

canvas=document.getElementById('editorCanvas'); ctx=canvas.getContext('2d');
canvas.addEventListener('mousedown',onStart,{passive:false}); canvas.addEventListener('mousemove',onMove,{passive:false}); canvas.addEventListener('mouseup',onEnd,{passive:false});
canvas.addEventListener('touchstart',onStart,{passive:false}); canvas.addEventListener('touchmove',onMove,{passive:false}); canvas.addEventListener('touchend',onEnd,{passive:false});

function setTool(t){tool=t;['pen','circle','arrow','text'].forEach(n=>document.getElementById('tool'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('active',n===t));}
function setColor(c){drawColor=c;document.querySelectorAll('.color-dot').forEach(d=>d.classList.toggle('active',d.dataset.color===c));}
function setSize(s){drawSize=parseInt(s);}
function undoStroke(){if(strokes.length){strokes.pop();redrawCanvas();}}
function clearAnnotations(){strokes=[];redrawCanvas();}
function closeEditor(){document.getElementById('editorOverlay').classList.remove('show');}
function saveAnnotation(){currentImages[editingIndex]=canvas.toDataURL('image/jpeg');closeEditor();renderPhotoGrid();showToast('标注已保存 ✅');}

// ===================== 添加行 =====================
async function addRow(){
  const text=document.getElementById('textDisplay').value.trim();
  if(!text&&currentImages.length===0){showToast('请先录音或添加图片');return;}
  records.push({text,images:[...currentImages]});
  document.getElementById('textDisplay').value='';
  currentImages=[]; renderPhotoGrid(); renderRecordsList(); saveToStorage();
  showToast(`已添加第 ${records.length} 行 ✅`);
}

// ===================== 记录列表 =====================
function renderRecordsList(){
  const list=document.getElementById('recordsList');
  document.getElementById('recordCount').textContent=`${records.length} 行`;
  document.getElementById('exportBtn').disabled=records.length===0;
  if(!records.length){list.innerHTML='<div class="empty-tip">暂无记录，添加第一行吧～</div>';return;}
  list.innerHTML='';
  records.forEach((row,i)=>{
    const d=document.createElement('div'); d.className='record-item';
    d.innerHTML=`<div class="record-item-header"><span class="row-num">第 ${i+1} 行</span><button class="delete-row-btn" onclick="deleteRow(${i})">🗑 删除</button></div><div class="record-text">${row.text||'（无文字）'}</div>${row.images.length?`<div class="record-images">${row.images.map(s=>`<img src="${s}">`).join('')}</div>`:''}`;
    list.appendChild(d);
  });
}
function deleteRow(i){records.splice(i,1);renderRecordsList();saveToStorage();showToast('已删除');}
function clearAllRecords(){if(!records.length)return;if(!confirm(`确定清空全部 ${records.length} 行记录？`))return;records=[];renderRecordsList();saveToStorage();showToast('已清空所有记录');}

// ===================== Excel导出 =====================
function fitToCell(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=img.naturalWidth; c.height=img.naturalHeight;
      c.getContext('2d').drawImage(img,0,0);
      resolve({ base64:c.toDataURL('image/jpeg',0.95), width:img.naturalWidth, height:img.naturalHeight });
    };
    img.onerror=()=>resolve(null);
    img.src=dataUrl;
  });
}
function toBuffer(dataUrl){
  const bin=atob(dataUrl.split('base64,')[1]), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return arr.buffer;
}

async function exportExcel(){
  if(!records.length) return;
  showToast('正在生成Excel，请稍候...');
  document.getElementById('exportBtn').disabled=true;
  try{
    const wb=new ExcelJS.Workbook(), ws=wb.addWorksheet('记录');
    [50,60,60,60].forEach((w,i)=>{ws.getColumn(i+1).width=w;});
    const h=ws.getRow(1);
    h.values=['语音文字','图片1','图片2','图片3']; h.height=22;
    h.font={bold:true,color:{argb:'FFFFFFFF'},size:12};
    h.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF4472C4'}};
    h.alignment={vertical:'middle',horizontal:'center'};

    const MAX_W = 380;
    const MAX_H = 320; 

    for(let i=0;i<records.length;i++){
      const row=records[i],ri=i+2,er=ws.getRow(ri);
      er.height=280;
      const tc=ws.getCell(ri,1); tc.value=row.text||''; tc.alignment={vertical:'middle',wrapText:true}; tc.font={size:11};
      if(Array.isArray(row.images)){
        for(let j=0;j<Math.min(row.images.length,3);j++){
          const url=row.images[j];
          if(!url||!url.includes('base64,')) continue;
          try{
            const imgData = await fitToCell(url);
            if (!imgData) continue;

            const scale = Math.min(MAX_W / imgData.width, MAX_H / imgData.height);
            const finalW = Math.round(imgData.width * scale);
            const finalH = Math.round(imgData.height * scale);

            const id=wb.addImage({buffer:toBuffer(imgData.base64),extension:'jpeg'});
            
            ws.addImage(id,{
              tl:{col: j + 1 + 0.02, row: ri - 1 + 0.02}, 
              ext:{width: finalW, height: finalH},
              editAs:'oneCell' 
            });
          }catch(e){console.error('图片跳过',e);}
        }
      }
    }
    const buf=await wb.xlsx.writeBuffer();
    saveAs(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),
      `语音拍照记录_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'')}.xlsx`);
    showToast('导出成功 📊');
  }catch(e){showToast('导出失败：'+e.message);console.error(e);}
  finally{document.getElementById('exportBtn').disabled=false;}
}
// ===================== Toast =====================
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
