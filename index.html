<script>
// ===================== 讯飞配置 =====================
const XF_APPID      = 'ed958adf';
const XF_API_KEY    = '21849580283bff759bb2a50f6ed0db2d';
const XF_API_SECRET = 'Yjk3ZDBkNmVkMmRjZWNjNTQ5MTEzYjEy';

// ===================== 全局状态 =====================
let records=[], currentImages=[], isRecording=false, mediaRecorder=null, audioChunks=[], safetyTimer=null;

// ===================== IndexedDB =====================
const DB_NAME='voiceExcelDB', DB_VERSION=1, STORE_NAME='records';
let db=null;
function openDB() {
  return new Promise((resolve,reject) => {
    if(db){resolve(db);return;}
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(STORE_NAME,{keyPath:'id'});
    req.onsuccess=e=>{db=e.target.result;resolve(db);};
    req.onerror=e=>reject(e.target.error);
  });
}
async function saveToStorage() {
  try {
    const idb=await openDB();
    const tx=idb.transaction(STORE_NAME,'readwrite');
    const store=tx.objectStore(STORE_NAME);
    store.clear();
    records.forEach((row,i)=>store.put({id:i,...row}));
    tx.onerror=e=>console.error('保存失败',e.target.error);
  } catch(e){console.error(e);}
}
async function loadFromStorage() {
  try {
    const idb=await openDB();
    const req=idb.transaction(STORE_NAME,'readonly').objectStore(STORE_NAME).getAll();
    req.onsuccess=()=>{
      const rows=req.result;
      if(rows&&rows.length){
        records=rows.sort((a,b)=>a.id-b.id).map(({id,...rest})=>rest);
        renderRecordsList();
        showToast(`已恢复 ${records.length} 行记录`);
      }
    };
  } catch(e){console.error(e);}
}
window.addEventListener('load', loadFromStorage);

// ===================== 图片压缩 =====================
function compressImage(dataUrl, maxSize=2000, quality=0.95) {
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxSize/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const c=document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

// ===================== 编辑器 =====================
let editingIndex=-1, tool='pen', drawColor='#ff3b30', drawSize=4;
let strokes=[], currentStroke=null, isDrawing=false, baseImage=null, canvas, ctx, startX, startY;

// ===================== 讯飞鉴权 =====================
async function getXFUrl() {
  const host='iat-api.xfyun.cn', date=new Date().toUTCString();
  const signOrigin=`host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
  const enc=new TextEncoder();
  const key=await crypto.subtle.importKey('raw',enc.encode(XF_API_SECRET),{name:'HMAC',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('HMAC',key,enc.encode(signOrigin));
  const sigB64=btoa(String.fromCharCode(...new Uint8Array(sig)));
  const authOrigin=`api_key="${XF_API_KEY}", algorithm="hmac-sha256", headers="host date request-line", signature="${sigB64}"`;
  return `wss://${host}/v2/iat?authorization=${encodeURIComponent(btoa(authOrigin))}&date=${encodeURIComponent(date)}&host=${host}`;
}

// ===================== PCM转换 =====================
function convertToPCM(blob) {
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('读取音频失败'));
    reader.onload=e=>{
      let ac;
      try{ac=new (window.AudioContext||window.webkitAudioContext)({sampleRate:16000});}
      catch(err){return reject(new Error('AudioContext失败'));}
      const t=setTimeout(()=>{try{ac.close();}catch(_){}reject(new Error('解码超时'));},8000);
      ac.decodeAudioData(e.target.result,
        buf=>{
          clearTimeout(t);
          const pcm=buf.getChannelData(0), i16=new Int16Array(pcm.length);
          for(let i=0;i<pcm.length;i++) i16[i]=Math.max(-32768,Math.min(32767,Math.round(pcm[i]*32767)));
          ac.close().catch(()=>{});
          resolve(new Blob([i16.buffer],{type:'audio/L16'}));
        },
        ()=>{clearTimeout(t);try{ac.close();}catch(_){}resolve(blob);}
      );
    };
    reader.readAsArrayBuffer(blob);
  });
}

// ===================== 讯飞识别 =====================
function recognizeAudio(audioBlob) {
  return new Promise(async(resolve,reject)=>{
    let url; try{url=await getXFUrl();}catch(e){return reject(new Error('鉴权失败'));}
    let pcmBlob; try{pcmBlob=await convertToPCM(audioBlob);}catch(e){return reject(new Error('音频处理失败'));}
    let pcmArray; try{pcmArray=new Uint8Array(await pcmBlob.arrayBuffer());}catch(e){return reject(new Error('音频读取失败'));}
    const segs=[]; let settled=false;
    const done=t=>{if(settled)return;settled=true;resolve(t);};
    const fail=e=>{if(settled)return;settled=true;reject(e);};
    let ws; try{ws=new WebSocket(url);}catch(e){return fail(new Error('WebSocket创建失败'));}
    const wst=setTimeout(()=>{try{ws.close();}catch(_){}done(segs.join(''));},60000);
    ws.onopen=()=>{
      const FRAME=1280; let offset=0,idx=0;
      const send=()=>{
        if(settled) return;
        if(offset>=pcmArray.length){
          try{ws.send(JSON.stringify({data:{status:2,format:'audio/L16;rate=16000',encoding:'raw',audio:''}}));}catch(_){}
          return;
        }
        const chunk=pcmArray.slice(offset,offset+FRAME);
        const b64=btoa(String.fromCharCode(...chunk));
        const isFirst=idx===0;
        const frame={
          ...(isFirst?{common:{app_id:XF_APPID}}:{}),
          ...(isFirst?{business:{language:'zh_cn',domain:'iat',accent:'mandarin',vad_eos:5000,dwa:'wpgs'}}:{}),
          data:{status:isFirst?0:1,format:'audio/L16;rate=16000',encoding:'raw',audio:b64}
        };
        try{ws.send(JSON.stringify(frame));}catch(_){return;}
        offset+=FRAME; idx++; setTimeout(send,40);
      };
      send();
    };
    ws.onmessage=e=>{
      let msg; try{msg=JSON.parse(e.data);}catch(_){return;}
      if(msg.code!==0){clearTimeout(wst);try{ws.close();}catch(_){}fail(new Error(`讯飞错误(${msg.code}):${msg.message}`));return;}
      if(msg.data?.result){
        let text='';
        (msg.data.result.ws||[]).forEach(w=>w.cw.forEach(c=>{text+=c.w;}));
        const pgs=msg.data.result.pgs, rg=msg.data.result.rg;
        if(pgs==='rpl'&&Array.isArray(rg)&&rg.length===2) segs.splice(rg[0]-1,rg[1]-rg[0]+1,text);
        else segs.push(text);
        document.getElementById('textDisplay').value=segs.join('');
      }
      if(msg.data?.status===2){clearTimeout(wst);try{ws.close();}catch(_){}done(segs.join(''));}
    };
    ws.onerror=()=>{clearTimeout(wst);fail(new Error('WebSocket连接失败'));};
    ws.onclose=()=>{clearTimeout(wst);done(segs.join(''));};
  });
}

// ===================== 录音 =====================
async function toggleRecording(){if(isRecording)stopRecording();else await startRecording();}

function setBtnRecording(){
  isRecording=true;
  document.getElementById('voiceBtn').className='voice-btn recording';
  document.getElementById('voiceBtnInner').innerHTML='<div class="wave-bars"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div> 点击停止录音';
  const s=document.getElementById('voiceStatus'); s.textContent='🔴 正在录音...'; s.className='voice-status recording';
}
function setBtnProcessing(){
  isRecording=false;
  document.getElementById('voiceBtn').className='voice-btn processing';
  document.getElementById('voiceBtnInner').textContent='⏳ 识别中...';
  const s=document.getElementById('voiceStatus'); s.textContent='正在识别，请稍候...'; s.className='voice-status processing';
}
function setBtnIdle(){
  isRecording=false;
  document.getElementById('voiceBtn').className='voice-btn';
  document.getElementById('voiceBtnInner').textContent='🎤 点击开始录音';
  const s=document.getElementById('voiceStatus'); s.textContent='点击按钮开始说话，说完再次点击停止识别'; s.className='voice-status';
}

async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const mime=['audio/webm;codecs=pcm','audio/webm','audio/ogg'].find(t=>MediaRecorder.isTypeSupported(t))||'';
    mediaRecorder=new MediaRecorder(stream,mime?{mimeType:mime}:{});
    audioChunks=[];
    document.getElementById('textDisplay').value='';
    mediaRecorder.ondataavailable=e=>{if(e.data&&e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      setBtnProcessing();
      clearTimeout(safetyTimer);
      safetyTimer=setTimeout(()=>{showToast('识别超时，请重试');setBtnIdle();},35000);
      try{
        if(!audioChunks.length) throw new Error('未录到音频');
        const result=await recognizeAudio(new Blob(audioChunks,{type:mime||'audio/webm'}));
        document.getElementById('textDisplay').value=result;
        if(!result.trim()) showToast('未识别到内容，请重试');
      }catch(err){showToast('识别失败：'+err.message);document.getElementById('textDisplay').value='';}
      finally{clearTimeout(safetyTimer);setBtnIdle();}
    };
    mediaRecorder.onerror=()=>{showToast('录音出错');isRecording=false;setBtnIdle();};
    mediaRecorder.start(500);
    setBtnRecording();
    safetyTimer=setTimeout(()=>{if(isRecording)stopRecording();},58000);
  }catch(err){showToast('无法启动录音：'+err.message);setBtnIdle();}
}
function stopRecording(){if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();isRecording=false;}

// ===================== 图片 =====================
function addPhoto(){
  if(currentImages.length>=3){showToast('最多添加3张图片');return;}
  document.getElementById('fileInput').click();
}
async function handleFileSelect(e){
  for(const file of e.target.files){
    if(currentImages.length>=3) break;
    if(!file.type.startsWith('image/')) continue;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const compressed=await compressImage(ev.target.result,2000,0.95);
      currentImages.push(compressed);
      renderPhotoGrid();
    };
    reader.readAsDataURL(file);
  }
  e.target.value='';
}
function removePhoto(i){currentImages.splice(i,1);renderPhotoGrid();}
function renderPhotoGrid(){
  const grid=document.getElementById('photoGrid');
  grid.innerHTML='';
  currentImages.forEach((src,i)=>{
    const d=document.createElement('div'); d.className='photo-item';
    d.innerHTML=`<img src="${src}"><div class="btn-row"><button class="edit-btn" onclick="openEditor(${i})">✏️</button><button class="remove-btn" onclick="removePhoto(${i})">✕</button></div>`;
    grid.appendChild(d);
  });
  if(currentImages.length<3){
    const add=document.createElement('div'); add.className='add-photo-btn'; add.onclick=addPhoto;
    add.innerHTML='<span>＋</span><span>拍照/选图</span>'; grid.appendChild(add);
  }
}

// ===================== 标注编辑器 =====================
function openEditor(index){
  editingIndex=index; strokes=[]; currentStroke=null; isDrawing=false;
  baseImage=new Image();
  baseImage.onload=()=>{
    const scale=Math.min((window.innerWidth-20)/baseImage.width,(window.innerHeight-180)/baseImage.height,1);
    canvas.width=baseImage.width*scale; canvas.height=baseImage.height*scale;
    redrawCanvas(); document.getElementById('editorOverlay').classList.add('show');
  };
  baseImage.src=currentImages[index];
}
function redrawCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(baseImage,0,0,canvas.width,canvas.height);strokes.forEach(s=>drawStroke(s));}
function drawStroke(stroke){
  ctx.save(); ctx.strokeStyle=stroke.color; ctx.fillStyle=stroke.color;
  ctx.lineWidth=stroke.size; ctx.lineCap='round'; ctx.lineJoin='round';
  if(stroke.type==='pen'){ctx.beginPath();stroke.points.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();}
  else if(stroke.type==='circle'){const dx=stroke.x2-stroke.x1,dy=stroke.y2-stroke.y1;ctx.beginPath();ctx.ellipse(stroke.x1+dx/2,stroke.y1+dy/2,Math.abs(dx)/2,Math.abs(dy)/2,0,0,Math.PI*2);ctx.stroke();}
  else if(stroke.type==='arrow'){const angle=Math.atan2(stroke.y2-stroke.y1,stroke.x2-stroke.x1),hLen=Math.max(15,stroke.size*4);ctx.beginPath();ctx.moveTo(stroke.x1,stroke.y1);ctx.lineTo(stroke.x2,stroke.y2);ctx.stroke();ctx.beginPath();ctx.moveTo(stroke.x2,stroke.y2);ctx.lineTo(stroke.x2-hLen*Math.cos(angle-Math.PI/7),stroke.y2-hLen*Math.sin(angle-Math.PI/7));ctx.lineTo(stroke.x2-hLen*Math.cos(angle+Math.PI/7),stroke.y2-hLen*Math.sin(angle+Math.PI/7));ctx.closePath();ctx.fill();}
  else if(stroke.type==='text'){ctx.font=`bold ${stroke.size*5+10}px PingFang SC,sans-serif`;ctx.fillText(stroke.text,stroke.x1,stroke.y1);}
  ctx.restore();
}
function getPos(e){const rect=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;return{x:(src.clientX-rect.left)*canvas.width/rect.width,y:(src.clientY-rect.top)*canvas.height/rect.height};}
function onStart(e){e.preventDefault();const pos=getPos(e);startX=pos.x;startY=pos.y;if(tool==='text'){const t=prompt('请输入文字：');if(t){strokes.push({type:'text',color:drawColor,size:drawSize,x1:pos.x,y1:pos.y,text:t});redrawCanvas();}return;}isDrawing=true;currentStroke={type:tool,color:drawColor,size:drawSize,x1:pos.x,y1:pos.y,x2:pos.x,y2:pos.y,points:[{x:pos.x,y:pos.y}]};}
function onMove(e){e.preventDefault();if(!isDrawing||!currentStroke)return;const pos=getPos(e);if(tool==='pen')currentStroke.points.push({x:pos.x,y:pos.y});else{currentStroke.x2=pos.x;currentStroke.y2=pos.y;}redrawCanvas();drawStroke(currentStroke);}
function onEnd(e){e.preventDefault();if(!isDrawing||!currentStroke)return;isDrawing=false;strokes.push({...currentStroke});currentStroke=null;redrawCanvas();}

canvas=document.getElementById('editorCanvas'); ctx=canvas.getContext('2d');
canvas.addEventListener('mousedown',onStart,{passive:false}); canvas.addEventListener('mousemove',onMove,{passive:false}); canvas.addEventListener('mouseup',onEnd,{passive:false});
canvas.addEventListener('touchstart',onStart,{passive:false}); canvas.addEventListener('touchmove',onMove,{passive:false}); canvas.addEventListener('touchend',onEnd,{passive:false});

function setTool(t){tool=t;['pen','circle','arrow','text'].forEach(n=>document.getElementById('tool'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('active',n===t));}
function setColor(c){drawColor=c;document.querySelectorAll('.color-dot').forEach(d=>d.classList.toggle('active',d.dataset.color===c));}
function setSize(s){drawSize=parseInt(s);}
function undoStroke(){if(strokes.length){strokes.pop();redrawCanvas();}}
function clearAnnotations(){strokes=[];redrawCanvas();}
function closeEditor(){document.getElementById('editorOverlay').classList.remove('show');}
function saveAnnotation(){currentImages[editingIndex]=canvas.toDataURL('image/jpeg');closeEditor();renderPhotoGrid();showToast('标注已保存 ✅');}

// ===================== 添加行 =====================
async function addRow(){
  const text=document.getElementById('textDisplay').value.trim();
  if(!text&&currentImages.length===0){showToast('请先录音或添加图片');return;}
  records.push({text,images:[...currentImages]});
  document.getElementById('textDisplay').value='';
  currentImages=[]; renderPhotoGrid(); renderRecordsList(); saveToStorage();
  showToast(`已添加第 ${records.length} 行 ✅`);
}

// ===================== 记录列表 =====================
function renderRecordsList(){
  const list=document.getElementById('recordsList');
  document.getElementById('recordCount').textContent=`${records.length} 行`;
  document.getElementById('exportBtn').disabled=records.length===0;
  if(!records.length){list.innerHTML='<div class="empty-tip">暂无记录，添加第一行吧～</div>';return;}
  list.innerHTML='';
  records.forEach((row,i)=>{
    const d=document.createElement('div'); d.className='record-item';
    d.innerHTML=`<div class="record-item-header"><span class="row-num">第 ${i+1} 行</span><button class="delete-row-btn" onclick="deleteRow(${i})">🗑 删除</button></div><div class="record-text">${row.text||'（无文字）'}</div>${row.images.length?`<div class="record-images">${row.images.map(s=>`<img src="${s}">`).join('')}</div>`:''}`;
    list.appendChild(d);
  });
}
function deleteRow(i){records.splice(i,1);renderRecordsList();saveToStorage();showToast('已删除');}
function clearAllRecords(){if(!records.length)return;if(!confirm(`确定清空全部 ${records.length} 行记录？`))return;records=[];renderRecordsList();saveToStorage();showToast('已清空所有记录');}

// 替换原有的 fitToCell 函数
function fitToCell(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      // 保持原始分辨率
      c.width=img.naturalWidth;
      c.height=img.naturalHeight;
      const ct=c.getContext('2d');
      ct.drawImage(img,0,0);
      
      // 返回对象：包含高画质base64和原图的宽高
      resolve({
        base64: c.toDataURL('image/jpeg', 0.95), // 0.95 保证了很好的画质
        width: img.naturalWidth,
        height: img.naturalHeight
      });
    };
    img.onerror=()=>resolve(null);
    img.src=dataUrl;
  });
}
function toBuffer(dataUrl){const bin=atob(dataUrl.split('base64,')[1]),arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return arr.buffer;}

// 替换原有的 exportExcel 函数
async function exportExcel(){
  if(!records.length) return;
  showToast('正在生成Excel，请稍候...');
  document.getElementById('exportBtn').disabled=true;
  try{
    const wb=new ExcelJS.Workbook(), ws=wb.addWorksheet('记录');
    [50,60,60,60].forEach((w,i)=>{ws.getColumn(i+1).width=w;});
    const h=ws.getRow(1);
    h.values=['语音文字','图片1','图片2','图片3']; h.height=22;
    h.font={bold:true,color:{argb:'FFFFFFFF'},size:12};
    h.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF4472C4'}};
    h.alignment={vertical:'middle',horizontal:'center'};

    // 【修改点1】设置更保守的物理像素上限。
    // 行高 280 约等于 373 像素。我们将最大高度收缩到 320，确保底部有充足的安全边距。
    const MAX_W = 380; 
    const MAX_H = 320; 

    for(let i=0;i<records.length;i++){
      const row=records[i],ri=i+2,er=ws.getRow(ri);
      er.height=280;
      const tc=ws.getCell(ri,1); tc.value=row.text||''; tc.alignment={vertical:'middle',wrapText:true}; tc.font={size:11};
      
      if(Array.isArray(row.images)){
        for(let j=0;j<Math.min(row.images.length,3);j++){
          const url=row.images[j];
          if(!url||!url.includes('base64,')) continue;
          try{
            const imgData = await fitToCell(url);
            if (!imgData) continue;

            const scale = Math.min(MAX_W / imgData.width, MAX_H / imgData.height);
            const finalW = Math.round(imgData.width * scale);
            const finalH = Math.round(imgData.height * scale);

            const id=wb.addImage({buffer:toBuffer(imgData.base64),extension:'jpeg'});
            
            ws.addImage(id,{
              // 【修改点2】将偏移量改小 (0.05 -> 0.02)，防止图片被向下推挤出边框
              tl:{col: j + 1 + 0.02, row: ri - 1 + 0.02}, 
              ext:{width: finalW, height: finalH},
              editAs:'oneCell' 
            });
          }catch(e){console.error('图片跳过',e);}
        }
      }
    }
    const buf=await wb.xlsx.writeBuffer();
    saveAs(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),
      `语音拍照记录_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'')}.xlsx`);
    showToast('导出成功 📊');
  }catch(e){showToast('导出失败：'+e.message);console.error(e);}
  finally{document.getElementById('exportBtn').disabled=false;}
}

// ===================== Toast =====================
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
